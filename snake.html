<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #header {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 { font-size: 26px; color: #4ecca3; margin-bottom: 6px; }
        #scoreBoard { font-size: 16px; color: #ccc; }
        #gameCanvas {
            background: #0f3460;
            border: 3px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(78, 204, 163, 0.3);
            display: block;
        }
        #hint {
            margin-top: 10px;
            font-size: 13px;
            color: #888;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }
        #controls {
            margin-top: 18px;
            display: grid;
            grid-template-columns: 75px 75px 75px;
            grid-template-rows: 75px 75px 75px;
            gap: 8px;
        }
        .btn {
            width: 75px; height: 75px;
            background: rgba(78, 204, 163, 0.15);
            border: 2px solid #4ecca3;
            border-radius: 14px;
            color: #fff;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.08s;
        }
        .btn:active { background: #4ecca3; color: #1a1a2e; transform: scale(0.92); }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #overlay.active { display: flex; }
        #overlay h2 { font-size: 38px; color: #e74c3c; margin-bottom: 12px; }
        #overlay p { font-size: 22px; margin-bottom: 8px; color: #ccc; }
        #overlay .btn-restart {
            margin-top: 20px;
            padding: 14px 50px;
            font-size: 22px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        #overlay .btn-restart:active { background: #3db892; transform: scale(0.95); }

        @media (min-width: 600px) {
            #controls { display: none; }
        }
        @media (max-width: 380px) {
            h1 { font-size: 22px; }
            #controls {
                grid-template-columns: 65px 65px 65px;
                grid-template-rows: 65px 65px 65px;
            }
            .btn { width: 65px; height: 65px; font-size: 26px; }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🐍 贪吃蛇</h1>
        <div id="scoreBoard">得分: <span id="score">0</span> | 最高: <span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="hint">
        电脑：方向键 / WASD | 手机：滑动屏幕 或 点击按钮
    </div>

    <div id="controls">
        <div class="btn" id="btnUp">▲</div>
        <div class="btn" id="btnLeft">◀</div>
        <div class="btn" id="btnRight">▶</div>
        <div class="btn" id="btnDown">▼</div>
    </div>

    <div id="overlay">
        <h2 id="overlayTitle">游戏结束</h2>
        <p>最终得分: <span id="overlayScore">0</span></p>
        <button class="btn-restart" onclick="resetGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayScore = document.getElementById('overlayScore');

        const GRID_COUNT = 20;
        const GRID_SIZE = 20;
        const CANVAS_SIZE = 400;

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const maxDisplay = Math.min(window.innerWidth - 24, window.innerHeight * 0.42, 480);
            canvas.style.width = maxDisplay + 'px';
            canvas.style.height = maxDisplay + 'px';
            canvas.width = CANVAS_SIZE * dpr;
            canvas.height = CANVAS_SIZE * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        let snake, food, dirX, dirY, nextDirX, nextDirY;
        let score, highScore, gameRunning, gameStarted, paused;

        function init() {
            // 蛇初始长度3，居中偏左，静止等待玩家操作
            snake = [{x: 8, y: 10}, {x: 7, y: 10}, {x: 6, y: 10}];
            food = randomFood();
            dirX = 0; dirY = 0;
            nextDirX = 0; nextDirY = 0;
            score = 0;
            gameRunning = true;
            gameStarted = false;
            paused = false;
            scoreEl.textContent = score;
            highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
            highScoreEl.textContent = highScore;
            overlay.classList.remove('active');
        }

        function randomFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_COUNT),
                    y: Math.floor(Math.random() * GRID_COUNT)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            return pos;
        }

        function changeDirection(nx, ny) {
            if (!gameRunning) return;
            // 禁止反向直接掉头
            if (nx !== 0 && dirX !== 0) return;
            if (ny !== 0 && dirY !== 0) return;
            nextDirX = nx;
            nextDirY = ny;
            if (!gameStarted) gameStarted = true;
        }

        function update() {
            if (!gameRunning || !gameStarted || paused) return;

            dirX = nextDirX;
            dirY = nextDirY;

            const head = {
                x: snake[0].x + dirX,
                y: snake[0].y + dirY
            };

            // 撞墙
            if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                endGame();
                return;
            }

            // 撞自己
            for (let s of snake) {
                if (head.x === s.x && head.y === s.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHigh', highScore);
                }
                food = randomFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            //  subtle grid
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.06)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_COUNT; i++) {
                const pos = i * GRID_SIZE;
                ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, CANVAS_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(CANVAS_SIZE, pos); ctx.stroke();
            }

            // 食物（带发光效果）
            ctx.fillStyle = '#e74c3c';
            ctx.shadowColor = '#e74c3c';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 3,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇身
            for (let i = snake.length - 1; i >= 0; i--) {
                const s = snake[i];
                const pad = 1.5;
                const size = GRID_SIZE - pad * 2;
                const x = s.x * GRID_SIZE + pad;
                const y = s.y * GRID_SIZE + pad;

                if (i === 0) {
                    // 蛇头 - 更亮+发光
                    ctx.fillStyle = '#2ecc71';
                    ctx.shadowColor = '#2ecc71';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身 - 渐隐效果
                    const alpha = 0.4 + 0.6 * (1 - i / Math.max(snake.length, 1));
                    ctx.fillStyle = `rgba(78, 204, 163, ${alpha})`;
                    ctx.shadowBlur = 0;
                }

                roundRect(ctx, x, y, size, size, 5);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // 未开始提示遮罩
            if (!gameStarted && gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                ctx.fillStyle = '#4ecca3';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👇 选择方向开始', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 15);
                ctx.fillStyle = '#aaa';
                ctx.font = '16px sans-serif';
                ctx.fillText('点击按钮 或 滑动屏幕', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 20);
            }

            // 暂停提示
            if (paused) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('暂 停', CANVAS_SIZE / 2, CANVAS_SIZE / 2);
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function endGame() {
            gameRunning = false;
            overlayTitle.textContent = '游戏结束';
            overlayScore.textContent = score;
            overlay.classList.add('active');
        }

        function resetGame() {
            init();
        }

        function togglePause() {
            if (!gameRunning || !gameStarted) return;
            paused = !paused;
        }

        /* ========== 控制方式 ========== */

        // 键盘
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection(1, 0); break;
                case ' ': case 'p': case 'P': togglePause(); break;
            }
        });

        // 虚拟按钮（同时支持触摸和鼠标）
        function bindBtn(id, dx, dy) {
            const btn = document.getElementById(id);
            const go = (e) => {
                if (e.cancelable) e.preventDefault();
                changeDirection(dx, dy);
            };
            btn.addEventListener('touchstart', go, {passive: false});
            btn.addEventListener('mousedown', go);
        }
        bindBtn('btnUp', 0, -1);
        bindBtn('btnDown', 0, 1);
        bindBtn('btnLeft', -1, 0);
        bindBtn('btnRight', 1, 0);

        // 滑动手势（canvas区域）
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const threshold = 30;

            if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
                // 轻触 = 暂停
                togglePause();
                return;
            }

            if (Math.abs(dx) > Math.abs(dy)) {
                changeDirection(dx > 0 ? 1 : -1, 0);
            } else {
                changeDirection(0, dy > 0 ? 1 : -1);
            }
        }, {passive: true});

        // 防止页面滚动
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, {passive: false});

        /* ========== 游戏循环 ========== */
        setInterval(() => {
            update();
            draw();
        }, 220); // 约0.22秒移动一格，速度适中

        init();
    </script>
</body>
</html>
